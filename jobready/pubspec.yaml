name: jobready
description: Your personal accountability and job hunt tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  get: ^4.6.6
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # Charts & visuals
  fl_chart: ^0.68.0
  
  # Animations
  lottie: ^3.3.3
  
  # Date & time utils
  intl: ^0.19.0
  
  # Icons
  cupertino_icons: ^1.0.6
  http: ^1.6.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  google_sign_in: ^6.2.1
  google_fonts: ^8.1.0
  flutter_timezone: ^5.1.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/lottie/
